title: iOS AI Articles
description: Production-grade iOS engineering articles on Swift, SwiftUI, and Apple platform development — generated 2x/week.
url: "https://saurabhdave.github.io"
baseurl: "/ios-ai-articles"

permalink: /articles/:year/:month/:day/:title/

# Exclude repo files that aren't part of the blog
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - articles/
  - linkedin/
  - codegen/
  - newsletter/
  - scripts/

collections:
  newsletters:
    output: true
    permalink: /newsletter/:name/
  linkedin:
    output: true
    permalink: /posts/:name/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
