title: iOS AI Articles
description: Production-grade iOS engineering articles on Swift, SwiftUI, and Apple platform development — generated 3x/week.
url: "https://saurabhdave.github.io"
baseurl: "/ios-ai-articles"

theme: minima
minima:
  skin: classic
  date_format: "%B %-d, %Y"

permalink: /articles/:year/:month/:day/:title/

# Exclude repo files that aren't part of the blog
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - articles/
  - linkedin/
  - codegen/
  - scripts/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
