<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      document.documentElement.setAttribute('data-theme',s||d);
    })();
  </script>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <svg class="nav-logo" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L13.09 8.26L20 9.27L15 14.14L16.18 21.02L10 17.77L3.82 21.02L5 14.14L0 9.27L6.91 8.26L10 2Z" fill="url(#grad)" stroke="none"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="20" y2="20">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
          </defs>
        </svg>
        <span>iOS AI Articles</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link nav-link-home">Articles</a>
        <a href="{{ '/posts/' | relative_url }}" class="nav-link">Posts</a>
        <a href="{{ '/newsletter/' | relative_url }}" class="nav-link">Newsletter</a>
        <a href="https://github.com/saurabhdave/ios-ai-articles" class="nav-link nav-link-gh" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="toggle-track">
            <!-- Sun on left -->
            <span class="toggle-icon toggle-icon-sun">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </span>
            <!-- Sliding thumb -->
            <span class="toggle-thumb"></span>
            <!-- Moon on right -->
            <span class="toggle-icon toggle-icon-moon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </span>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <main class="main">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-text">Production-grade iOS engineering, generated 3× per week.</p>
      <p class="footer-sub">Swift &middot; SwiftUI &middot; Apple Platform</p>
    </div>
  </footer>
  <script>
    document.getElementById('theme-toggle').addEventListener('click',function(){
      var t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
      document.documentElement.setAttribute('data-theme',t);
      localStorage.setItem('theme',t);
    });
  </script>
  <script>
  (function(){
    var dd=null;
    function getDD(){
      if(dd) return dd;
      dd=document.createElement('div');
      dd.className='share-dropdown';
      dd.setAttribute('role','menu');
      dd.innerHTML=
        '<a class="share-option" id="sd-li" href="#" target="_blank" rel="noopener noreferrer">'+
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'+
          'LinkedIn'+
        '</a>'+
        '<a class="share-option" id="sd-tw" href="#" target="_blank" rel="noopener noreferrer">'+
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.432-8.502L2.01 2.25H8.08l4.262 5.638 5.902-5.638zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
          'Twitter / X'+
        '</a>'+
        '<a class="share-option" id="sd-hn" href="#" target="_blank" rel="noopener noreferrer">'+
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M0 24V0h24v24H0zM6.951 5.896l4.112 7.708v5.064h1.583v-4.972l4.148-7.799h-1.749l-2.457 4.875c-.372.745-.688 1.434-.688 1.434s-.297-.708-.651-1.434L8.831 5.896H6.95z"/></svg>'+
          'Hacker News'+
        '</a>'+
        '<button class="share-option" id="sd-copy">'+
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'+
          'Copy link'+
        '</button>';
      document.body.appendChild(dd);
      dd.querySelector('#sd-copy').addEventListener('click',function(e){
        e.stopPropagation();
        var url=dd.dataset.url;
        navigator.clipboard.writeText(url).then(function(){
          var btn=dd.querySelector('#sd-copy');
          btn.classList.add('share-option-copied');
          btn.lastChild.textContent=' Copied!';
          setTimeout(function(){ btn.classList.remove('share-option-copied'); btn.lastChild.textContent=' Copy link'; close(); },1400);
        }).catch(function(){
          var ta=document.createElement('textarea');
          ta.value=url; ta.style.position='fixed'; ta.style.opacity='0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy');
          document.body.removeChild(ta); close();
        });
      });
      return dd;
    }
    function close(){ if(dd) dd.classList.remove('open'); }
    function open(btn,url,title){
      var el=getDD();
      el.dataset.url=url;
      el.querySelector('#sd-li').href='https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url);
      el.querySelector('#sd-tw').href='https://twitter.com/intent/tweet?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(title);
      el.querySelector('#sd-hn').href='https://news.ycombinator.com/submitlink?u='+encodeURIComponent(url)+'&t='+encodeURIComponent(title);
      var r=btn.getBoundingClientRect();
      el.style.top=(r.bottom+6)+'px';
      var rightSpace=window.innerWidth-r.right;
      if(rightSpace>=190){ el.style.left=r.left+'px'; el.style.right='auto'; el.style.transformOrigin='top left'; }
      else { el.style.right=(window.innerWidth-r.right)+'px'; el.style.left='auto'; el.style.transformOrigin='top right'; }
      el.classList.add('open');
    }
    document.addEventListener('click',function(e){
      var btn=e.target.closest('[data-share]');
      if(btn){
        e.preventDefault(); e.stopPropagation();
        var url=btn.dataset.shareUrl||window.location.href;
        var title=btn.dataset.shareTitle||document.title;
        if(navigator.share){ navigator.share({title:title,url:url}).catch(function(){}); return; }
        if(dd&&dd.classList.contains('open')){ close(); return; }
        open(btn,url,title);
        return;
      }
      if(dd&&!dd.contains(e.target)) close();
    });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') close(); });
  })();
  </script>
</body>
</html>
